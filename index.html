<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PYOF</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#130f1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PYOF">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500;1,600&family=Noto+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:       #130f1a;
  --bg-card:  #1c1626;
  --line:     #2e2440;
  --gold:     #c9a468;
  --gold-dim: rgba(201,164,104,0.12);
  --rose:     #d88c7a;
  --ink:      #ede7e0;
  --ink-dim:  #9a8faa;
  --yes:      #7ba88a;
  --no:       #c47a73;
  --joker:    #d88c7a;
  --r:        12px;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html{ background:var(--bg); }

body{
  background:
    radial-gradient(ellipse 100% 40% at 50% 0%, rgba(201,164,104,0.07) 0%, transparent 70%),
    var(--bg);
  color:var(--ink);
  font-family:'Noto Sans Thai', sans-serif;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding: env(safe-area-inset-top, 0px) 0 60px;
}

/* ── Header ── */
.header{
  width:100%;
  text-align:center;
  padding:36px 20px 20px;
  position:relative;
}
.header::after{
  content:'';
  display:block;
  width:48px;
  height:1px;
  background:var(--gold);
  opacity:0.4;
  margin:18px auto 0;
}

.title{
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(36px, 8vw, 52px);
  font-weight:600;
  letter-spacing:0.18em;
  color:var(--ink);
  line-height:1;
}
.subtitle{
  font-size:12px;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--gold);
  opacity:0.7;
  margin-top:8px;
}

/* ── Control panel ── */
.panel{
  width:calc(100% - 32px);
  max-width:440px;
  background:rgba(255,255,255,0.02);
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:18px 20px;
  margin:20px 0 16px;
}

.panel-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.panel-label{
  font-size:13px;
  color:var(--ink-dim);
}

.stepper{
  display:flex;
  align-items:center;
  gap:16px;
}
.stepper button{
  width:32px; height:32px;
  border-radius:50%;
  border:1px solid var(--line);
  background:rgba(255,255,255,0.03);
  color:var(--gold);
  font-size:18px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.stepper button:hover{ background:var(--gold-dim); border-color:var(--gold); }
.stepper button:active{ transform:scale(0.9); }
.stepper button:disabled{ opacity:0.25; cursor:not-allowed; }
.stepper button:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

.count-num{
  font-family:'Cormorant Garamond', serif;
  font-size:30px;
  color:var(--ink);
  min-width:32px;
  text-align:center;
  line-height:1;
}

/* ── Draw button ── */
.draw-btn{
  display:block;
  width:calc(100% - 32px);
  max-width:440px;
  margin:0 0 32px;
  padding:15px;
  border-radius:var(--r);
  border:1px solid var(--gold);
  background:linear-gradient(180deg, rgba(201,164,104,0.14), rgba(201,164,104,0.04));
  color:var(--gold);
  font-family:'Noto Sans Thai', sans-serif;
  font-size:15px;
  font-weight:500;
  letter-spacing:0.04em;
  cursor:pointer;
  transition:box-shadow 0.2s, transform 0.1s;
  -webkit-tap-highlight-color:transparent;
}
.draw-btn:hover{ box-shadow:0 0 28px rgba(201,164,104,0.16); }
.draw-btn:active{ transform:scale(0.985); }
.draw-btn:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; }
.draw-btn:disabled{ opacity:0.35; cursor:not-allowed; box-shadow:none; }

/* ── Spread grid ── */
.spread{
  width:calc(100% - 32px);
  max-width:580px;
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:12px;
  justify-items:center;
}

/* single card: full width */
.spread.count-1{ grid-template-columns:1fr; max-width:240px; }
/* two cards */
.spread.count-2{ grid-template-columns:repeat(2, 1fr); max-width:400px; }
/* 3+ stays 3-col */

/* ── Card ── */
.card{
  width:100%;
  max-width:180px;
  aspect-ratio:2/3;
  perspective:1000px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

/* For single/double layouts allow bigger cards */
.spread.count-1 .card,
.spread.count-2 .card{ max-width:100%; }

.card-inner{
  width:100%; height:100%;
  position:relative;
  transition:transform 0.6s cubic-bezier(.4,.2,.2,1);
  transform-style:preserve-3d;
}
.card.flipped .card-inner{ transform:rotateY(180deg); }

.card-face{
  position:absolute; inset:0;
  border-radius:10px;
  backface-visibility:hidden;
  overflow:hidden;
}

/* Back */
.card-back{
  background:
    repeating-linear-gradient(135deg,
      rgba(201,164,104,0.05) 0px,
      rgba(201,164,104,0.05) 1px,
      transparent 1px, transparent 12px),
    linear-gradient(160deg, #1e1828, #150f1e);
  border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;
}
.card-back .glyph{
  width:40px; height:40px;
  border:1px solid rgba(201,164,104,0.45);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  color:var(--gold);
  font-family:'Cormorant Garamond',serif;
  font-size:18px;
  opacity:0.75;
}

/* Front */
.card-front{
  transform:rotateY(180deg);
  background:var(--bg-card);
  border:1px solid var(--line);
  display:flex;
  flex-direction:column;
}

.card-img{
  width:100%;
  flex:1;
  object-fit:cover;
  display:block;
  border-radius:10px 10px 0 0;
  background:#1a1426;
}

.card-img-placeholder{
  width:100%;
  flex:1;
  background:linear-gradient(180deg,#1e1828,#150f1e);
  display:flex; align-items:center; justify-content:center;
  color:var(--gold);
  font-family:'Cormorant Garamond',serif;
  font-size:28px;
  opacity:0.5;
  border-radius:10px 10px 0 0;
}

.card-info{
  padding:8px 8px 10px;
  display:flex;
  flex-direction:column;
  gap:3px;
  border-top:1px solid var(--line);
}

.card-tag{
  font-size:9px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  padding:2px 7px;
  border-radius:20px;
  border:1px solid currentColor;
  width:fit-content;
}
.cat-yes   .card-tag{ color:var(--yes); }
.cat-no    .card-tag{ color:var(--no); }
.cat-joker .card-tag{ color:var(--joker); }

.card-name-en{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:clamp(13px,3.5vw,17px);
  font-weight:600;
  line-height:1.2;
  color:var(--ink);
}

.card-name-th{
  font-size:clamp(10px,2.5vw,12px);
  color:var(--ink-dim);
  line-height:1.45;
}

.card-num{
  position:absolute;
  top:7px; right:9px;
  font-family:'Cormorant Garamond',serif;
  font-size:11px;
  color:var(--ink-dim);
  opacity:0.45;
  pointer-events:none;
}

/* ── Footer hints ── */
.hint{
  color:var(--ink-dim);
  font-size:12px;
  margin-top:24px;
  text-align:center;
  opacity:0.55;
}
.reset-btn{
  display:block;
  background:none; border:none;
  color:var(--ink-dim);
  font-size:13px;
  text-decoration:underline;
  text-decoration-color:var(--line);
  cursor:pointer;
  margin:20px auto 0;
  padding:6px 12px;
}
.reset-btn:hover{ color:var(--gold); }
.reset-btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

.empty{
  color:var(--ink-dim);
  font-size:13px;
  text-align:center;
  opacity:0.5;
  margin-top:4px;
}

/* ── Entrance animation ── */
@keyframes cardIn{
  from{ opacity:0; transform:translateY(16px); }
  to  { opacity:1; transform:translateY(0); }
}

@media(prefers-reduced-motion:reduce){
  *{ animation:none !important; transition-duration:0.01ms !important; }
}
</style>
</head>
<body>

<header class="header">
  <div class="title">PYOF</div>
  <div class="subtitle">Pick Your Own Fate</div>
</header>

<div class="panel">
  <div class="panel-row">
    <span class="panel-label">จำนวนไพ่</span>
    <div class="stepper">
      <button id="decBtn" aria-label="ลด">−</button>
      <span class="count-num" id="countNum">1</span>
      <button id="incBtn" aria-label="เพิ่ม">+</button>
    </div>
  </div>
</div>

<button class="draw-btn" id="drawBtn">✦ &nbsp;สุ่มไพ่</button>

<p class="empty" id="emptyMsg">เลือกจำนวนใบแล้วกดสุ่มไพ่</p>

<div class="spread" id="spread"></div>

<p class="hint" id="hintMsg" style="display:none">แตะไพ่เพื่อเปิดดูความหมาย</p>
<button class="reset-btn" id="resetBtn" style="display:none">เคลียร์</button>

<script>
const DECK = [
  {n:1,  en:"Sustain",           th:"สำเร็จแบบยั่งยืน",                          cat:"yes"},
  {n:2,  en:"Temporary",         th:"สำเร็จแต่อยู่ได้ชั่วคราว",                  cat:"yes"},
  {n:3,  en:"Unexpected Success",th:"สำเร็จแบบไม่คาดคิด",                        cat:"yes"},
  {n:4,  en:"Partial Success",   th:"สำเร็จน้อยกว่าที่หวัง",                     cat:"yes"},
  {n:5,  en:"Miracle",           th:"สำเร็จแบบปาฏิหาริย์",                       cat:"yes"},
  {n:6,  en:"Costly Victory",    th:"สำเร็จแต่ไม่คุ้ม",                          cat:"yes"},
  {n:7,  en:"Delay",             th:"สำเร็จแต่ล่าช้า",                           cat:"yes"},
  {n:8,  en:"Early Success",     th:"สำเร็จเร็วกว่าที่คิด",                      cat:"yes"},
  {n:9,  en:"Smart Move",        th:"สำเร็จจากไหวพริบ",                          cat:"yes"},
  {n:10, en:"Earned",            th:"สำเร็จจากความสามารถและความพยายาม",           cat:"yes"},
  {n:11, en:"Shared Success",    th:"สำเร็จจากความร่วมมือ",                      cat:"yes"},
  {n:12, en:"Relief",            th:"สำเร็จและปลดภาระ",                          cat:"yes"},
  {n:13, en:"Different Outcome", th:"สำเร็จแต่ไม่เป็นอย่างที่คิด",              cat:"yes"},
  {n:14, en:"Recovery",          th:"สถานการณ์กลับมาดีขึ้น",                    cat:"yes"},
  {n:15, en:"Open Door",         th:"โอกาสเปิดออกแล้ว",                         cat:"yes"},
  {n:16, en:"One More Try",      th:"ได้ แต่ควรลองอีกครั้ง",                    cat:"yes"},
  {n:17, en:"Better This Way",   th:"ไม่สำเร็จแต่ดีแล้วที่ไม่สำเร็จ",          cat:"no"},
  {n:18, en:"Deceived",          th:"ถูกหลอก",                                   cat:"no"},
  {n:19, en:"No Loss",           th:"ไม่สำเร็จแต่ไม่ขาดทุน",                    cat:"no"},
  {n:20, en:"Heavy Cost",        th:"ไม่สำเร็จและเสียมากกว่าที่คิด",             cat:"no"},
  {n:21, en:"Red Tape",          th:"ไม่สำเร็จเพราะระเบียบและขั้นตอน",          cat:"no"},
  {n:22, en:"Accident",          th:"ไม่สำเร็จเพราะเหตุไม่คาดคิด",              cat:"no"},
  {n:23, en:"Miss Timing",       th:"ไม่สำเร็จเพราะจังหวะไม่เหมาะ",             cat:"no"},
  {n:24, en:"Oversight",         th:"ไม่สำเร็จเพราะมองข้ามสิ่งเล็กๆ",           cat:"no"},
  {n:25, en:"Reject",            th:"ไม่สำเร็จอย่างชัดเจน",                     cat:"no"},
  {n:26, en:"Wrong Path",        th:"เดินมาผิดทาง",                              cat:"no"},
  {n:27, en:"Hard Fall",         th:"ไม่สำเร็จและกระทบแรง",                     cat:"no"},
  {n:28, en:"False Hope",        th:"ไม่สำเร็จทั้งที่ดูเหมือนจะได้",            cat:"no"},
  {n:29, en:"Wasted Effort",     th:"ความพยายามไม่คุ้ม",                         cat:"no"},
  {n:30, en:"Lost Chance",       th:"ไม่สำเร็จเพราะโอกาสหลุดมือ",               cat:"no"},
  {n:31, en:"Closed Door",       th:"ทางนี้ปิดแล้ว",                            cat:"no"},
  {n:32, en:"Not Worth Trying",  th:"ไม่คุ้มที่จะพยายามต่อ",                    cat:"no"},
  {n:33, en:"Right Choice",      th:"ได้ ถ้าตัดสินใจให้ชัด",                    cat:"yes"},
  {n:34, en:"Patience",          th:"ได้ ถ้ารอจังหวะ",                           cat:"yes"},
  {n:35, en:"More Effort",       th:"ได้ ถ้าเพิ่มความพยายาม",                   cat:"yes"},
  {n:36, en:"Support",           th:"ได้ ถ้ามีคนช่วย",                           cat:"yes"},
  {n:37, en:"Learn More",        th:"ได้ ถ้าข้อมูลครบกว่านี้",                  cat:"yes"},
  {n:38, en:"Openness",          th:"ได้ ถ้าอีกฝ่ายเปิดทาง",                    cat:"yes"},
  {n:39, en:"Undecided",         th:"ไม่ได้ เพราะยังไม่ตัดสินใจ",               cat:"no"},
  {n:40, en:"Lack of Skill",     th:"ไม่ได้ เพราะทักษะยังไม่พอ",                cat:"no"},
  {n:41, en:"Holding Too Tight", th:"ไม่ได้ เพราะยึดติดมากเกินไป",              cat:"no"},
  {n:42, en:"Lack of Support",   th:"ไม่ได้ เพราะขาดแรงสนับสนุน",               cat:"no"},
  {n:43, en:"Missing Piece",     th:"ไม่ได้ เพราะข้อมูลสำคัญยังขาด",            cat:"no"},
  {n:44, en:"Won't Budge",       th:"ไม่ได้ เพราะอีกฝ่ายไม่เปิดทาง",           cat:"no"},
  {n:45, en:"Skillful",          th:"สำเร็จจากความเชี่ยวชาญ",                   cat:"yes"},
  {n:46, en:"Ego",               th:"ไม่ได้ เพราะอีโก้ขวางอยู่",                cat:"no"},
  {n:47, en:"Twist of Fate",     th:"โชคชะตาหักมุม",                            cat:"joker"},
  {n:48, en:"Fortune's Fool",    th:"ตกเป็นของเล่นของโชคชะตา",                  cat:"joker"},
];

const TAG = { yes:"YES", no:"NO", joker:"JOKER" };
const MAX = 13;
let count = 1;

const countNum  = document.getElementById('countNum');
const decBtn    = document.getElementById('decBtn');
const incBtn    = document.getElementById('incBtn');
const drawBtn   = document.getElementById('drawBtn');
const spread    = document.getElementById('spread');
const emptyMsg  = document.getElementById('emptyMsg');
const hintMsg   = document.getElementById('hintMsg');
const resetBtn  = document.getElementById('resetBtn');

function updateStepper(){
  countNum.textContent = count;
  decBtn.disabled = count <= 1;
  incBtn.disabled = count >= MAX;
}

decBtn.addEventListener('click', () => { if(count>1){ count--; updateStepper(); } });
incBtn.addEventListener('click', () => { if(count<MAX){ count++; updateStepper(); } });

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function imgPath(n){
  return String(n).padStart(2,'0') + '.png';
}

function drawCards(){
  const picked = shuffle(DECK).slice(0, count);
  spread.innerHTML = '';

  // Set grid class
  spread.className = 'spread';
  if(count === 1) spread.classList.add('count-1');
  else if(count === 2) spread.classList.add('count-2');

  emptyMsg.style.display = 'none';
  hintMsg.style.display  = 'block';
  resetBtn.style.display = 'block';

  picked.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = `card cat-${card.cat}`;
    el.setAttribute('role','button');
    el.setAttribute('tabindex','0');
    el.setAttribute('aria-label',`ไพ่ ${card.en}`);
    el.style.opacity = '0';
    el.style.animation = `cardIn 0.4s ease ${idx * 100}ms forwards`;

    el.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back">
          <div class="glyph">✦</div>
        </div>
        <div class="card-face card-front">
          <img class="card-img"
               src="${imgPath(card.n)}"
               alt="${card.en}"
               loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="card-img-placeholder" style="display:none">✦</div>
          <div class="card-info">
            <span class="card-tag">${TAG[card.cat]}</span>
            <span class="card-name-en">${card.en}</span>
            <span class="card-name-th">${card.th}</span>
          </div>
          <span class="card-num">${String(card.n).padStart(2,'0')}</span>
        </div>
      </div>`;

    function flip(){ el.classList.toggle('flipped'); }
    el.addEventListener('click', flip);
    el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); flip(); } });

    spread.appendChild(el);
  });
}

drawBtn.addEventListener('click', drawCards);

resetBtn.addEventListener('click', () => {
  spread.innerHTML = '';
  spread.className = 'spread';
  emptyMsg.style.display = 'block';
  hintMsg.style.display  = 'none';
  resetBtn.style.display = 'none';
});

updateStepper();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
